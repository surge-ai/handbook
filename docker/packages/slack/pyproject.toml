[build-system]
build-backend = "uv_build"
requires = [ "uv-build>=0.11,<0.12" ]

[project]
name = "slack-mock"
version = "0.1.0"
description = "Slack mock MCP server"
requires-python = ">=3.13"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "fastmcp>=3,<4",
  "pydantic>=2.12.5",
  "starlette>=0.50",
  "uvicorn>=0.38",
]
scripts.slack-mock = "slack_mock:main"

[dependency-groups]
dev = [
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3",
  "ruff>=0.14.14",
]

[tool.ruff]
target-version = "py313"
line-length = 120
lint.select = [ "B", "E", "F", "I", "PLW", "SIM", "UP" ]
lint.ignore = [ "E501", "PLW0603" ]
lint.isort.known-first-party = [ "slack_mock" ]

[tool.pytest]
ini_options.testpaths = [ "tests" ]
ini_options.asyncio_mode = "auto"
